  <div class="modal" id="modal">
    <button class="modal-close" aria-label="Close">X</button>
    <div class="modal-inner" id="modal-inner"></div>
  </div>

  <div class="modal" id="about-modal">
    <button class="modal-close" aria-label="Close">X</button>
    <div class="modal-inner">
      <img src="wunderkammer/about-handwriting.png" class="about-handwriting" alt="About">
    </div>
  </div>

  <script>
    const modal = document.getElementById('modal');
    const modalInner = document.getElementById('modal-inner');
    const aboutModal = document.getElementById('about-modal');

    function openModal(srcs, wide) {
      modalInner.innerHTML = '';
      srcs.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        if (wide) img.classList.add('wide');
        modalInner.appendChild(img);
      });
      modal.classList.add('open');
      document.body.classList.add('modal-open');
    }

    function closeModal() {
      modal.classList.remove('open');
      aboutModal.classList.remove('open');
      document.body.classList.remove('modal-open');
    }

    document.querySelectorAll('.hotspot[data-src], .hotspot[data-srcs]').forEach(h => {
      h.addEventListener('click', e => {
        e.preventDefault();
        if (h.dataset.srcs) {
          openModal(h.dataset.srcs.split(','), h.dataset.wide);
        } else {
          openModal([h.dataset.src], h.dataset.wide);
        }
      });
    });

    document.querySelectorAll('.about-link').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        aboutModal.classList.add('open');
        document.body.classList.add('modal-open');
      });
    });

    document.querySelectorAll('.modal-close').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        closeModal();
      });
    });

    modal.addEventListener('click', closeModal);
    aboutModal.addEventListener('click', closeModal);
  </script>
