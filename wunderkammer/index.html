<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HW</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>

    <!-- horizontal (desktop) -->
    <div class="img-wrap img-wrap-h">
      <img class="wunderkammer-horizontal"
           src="wunderkammer-horizontal.jpg"
           alt="">
      <!-- moebius pin -->
      <div class="hotspot" data-href="/bookcovers"
           style="top:10%;left:28.5%;width:6.5%;height:6.5%"></div>
      <!-- biz cards -->
      <div class="hotspot" data-src="biz-card-horizontal.jpg"
           style="top:48%;left:68%;width:16%;height:25%"></div>
      <!-- scotland map -->
      <div class="hotspot" data-srcs="scotland0.jpeg,scotland1.jpg,scotland2.jpg,scotland3.jpg,scotland5.jpg,scotland6.jpg,scotland7.jpg,scotland9.jpg,scotland10.jpg"
           style="top:38.5%;left:16%;width:12%;height:36.5%"></div>
      <!-- arch marks -->
      <div class="hotspot" data-href="https://dancingstar.press"
           style="top:76%;left:12%;width:2.5%;height:4.5%"></div>
      <div class="hotspot" data-href="https://onshoreleave.com"
           style="top:76%;left:17.5%;width:3.5%;height:4.5%"></div>
      <div class="hotspot" data-href="https://starlightconvenience.net"
           style="top:76%;left:23.5%;width:3.5%;height:4.5%"></div>
      <!-- ring -->
      <div class="hotspot" data-src="luxi.jpg"
           style="top:29.5%;left:42%;width:4%;height:5%"></div>
    </div>

    <!-- vertical (mobile) -->
    <div class="img-wrap img-wrap-v">
      <img class="wunderkammer-vertical"
           src="wunderkammer-vertical.jpg"
           alt="">
            <!-- moebius pin -->
      <div class="hotspot" data-href="/bookcovers"
           style="top:87.75%;left:39%;width:12%;height:5%"></div>
      <!-- biz cards -->
      <div class="hotspot" data-src="biz-card-vertical.jpg"
           style="top:48%;left:15%;width:28.5%;height:7%"></div>
     <div class="hotspot" data-src="biz-card-vertical.jpg"
           style="top:64%;left:67%;width:28.5%;height:7%"></div>
      <!-- scotland map -->
      <div class="hotspot" data-srcs="scotland0.jpeg,scotland1.jpg,scotland2.jpg,scotland3.jpg,scotland5.jpg,scotland6.jpg,scotland7.jpg,scotland9.jpg,scotland10.jpg"
           style="top:9.75%;left:24%;width:23%;height:22.5%"></div>
      <!-- arch marks -->
      <div class="hotspot" data-href="https://dancingstar.press"
           style="top:33%;left:16%;width:5.5%;height:2.5%"></div>
      <div class="hotspot" data-href="https://onshoreleave.com"
           style="top:33%;left:26.75%;width:6%;height:2.5%"></div>
      <div class="hotspot" data-href="https://starlightconvenience.net"
           style="top:33%;left:38.5%;width:6%;height:2.5%"></div>
      <!-- ring -->
      <div class="hotspot" data-src="luxi.jpg"
           style="top:64%;left:57.5%;width:6.5%;height:2.75%"></div>
    </div>

  </main>

  <div class="modal" id="modal">
    <div class="modal-inner" id="modal-inner"></div>
  </div>

  <script>
    const modal = document.getElementById('modal');
    const modalInner = document.getElementById('modal-inner');

    function openModal(srcs) {
      modalInner.innerHTML = '';
      srcs.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        modalInner.appendChild(img);
      });
      modal.classList.add('open');
      document.body.classList.add('modal-open');
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.classList.remove('modal-open');
    }

    document.querySelectorAll('.hotspot').forEach(h => {
      h.addEventListener('click', () => {
        if (h.dataset.href) {
          window.open(h.dataset.href, '_blank', 'noopener noreferrer');
        } else if (h.dataset.srcs) {
          openModal(h.dataset.srcs.split(','));
        } else if (h.dataset.src) {
          openModal([h.dataset.src]);
        }
      });
    });

    modal.addEventListener('click', closeModal);
  </script>
</body>
</html>
