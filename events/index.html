<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The White Diamond</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    font-family: Georgia, serif;
    color: #fff;
    text-align: center;
  }

  img {
    max-width: min(360px, 90vw);
    display: block;
    margin-bottom: 2rem;
  }

  .series {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 1rem;
  }

  .title {
    font-size: 1.4rem;
    font-weight: normal;
    letter-spacing: 0.05em;
    margin-bottom: 1.5rem;
  }

  .details {
    font-size: 1rem;
    line-height: 1.9;
    opacity: 0.75;
  }
</style>
</head>
<body>
  <img src="white-diamond.jpg" alt="">
  <p class="series">Dogpatch Spring Film Screenings</p>
  <p class="title">THE WHITE DIAMOND<br>Werner Herzog, 2004</p>
  <p class="details">Friday, April 3rd<br>6pm snacks &amp; film<br>1082 Penn. Ave Unit 303</p>
</body>
</html>
